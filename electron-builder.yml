appId: com.pueankaset.pos
productName: เพื่อนเกษตร POS
icon: build/icon.png
directories:
  buildResources: build
  output: dist
extraResources:
  - from: build/icon.png
    to: icon.png
  - from: build/icon.ico
    to: icon.ico
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!store.db'
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/pdf-to-printer/**
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  executableName: pueankaset
nsis:
  artifactName: pueankaset-${version}-setup.${ext}
  shortcutName: เพื่อนเกษตร POS
  uninstallDisplayName: เพื่อนเกษตร POS
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  entitlementsInherit: build/entitlements.mac.plist
dmg:
  artifactName: pueankaset-${version}-${arch}.${ext}
publish:
  provider: github
  owner: jppnp
  repo: pueankaset
